{{- if .Values.app.capture.persistence.enabled -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "airllm.fullname" . }}-captures
  labels:
    {{- include "airllm.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  accessModes:
    - {{ .Values.app.capture.persistence.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.app.capture.persistence.size | quote }}
  {{- with .Values.app.capture.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
