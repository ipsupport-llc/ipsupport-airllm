{{- if .Values.app.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "airllm.fullname" . }}
  labels:
    {{- include "airllm.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  {{- with .Values.app.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.app.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.app.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.app.ingress.host | quote }}
      secretName: {{ .Values.app.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.app.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "airllm.fullname" . }}
                port:
                  number: {{ .Values.app.service.port }}
{{- end }}
