# Production standalone stack for AirLLM. Distinct from docker-compose.yml (the
# dev/mock stack): this runs ENV=prod (master key REQUIRED, no dev seed / no fixed
# demo key), AUTH_MODE=local with a PERMANENT admin, persistent named volumes, and
# datastores that are NOT published on the host.
#
# Quickstart:  make gen-secrets   # writes deploy/.env
#              make compose-prod-up
# TLS:         docker compose -f deploy/compose.prod.yaml --profile tls up -d
# BERT:        add --profile bert
name: airllm

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airllm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env (run make gen-secrets)}
      POSTGRES_DB: airllm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airllm"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Internal only — no host port (the gateway reaches it over the compose network).
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      HTTP_ADDR: ":8080"
      ENV: "prod"
      AUTH_MODE: "local"
      # sslmode=disable is fine here: Postgres is on the internal compose network only
      # (no host port, no MITM surface) and postgres-alpine ships no TLS.
      DATABASE_URL: "postgres://airllm:${POSTGRES_PASSWORD}@postgres:5432/airllm?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      AIRLLM_MASTER_KEY: ${AIRLLM_MASTER_KEY:?set AIRLLM_MASTER_KEY in deploy/.env (run make gen-secrets)}
      AIRLLM_ADMIN_USERNAME: ${AIRLLM_ADMIN_USERNAME:-admin}
      AIRLLM_ADMIN_PASSWORD: ${AIRLLM_ADMIN_PASSWORD:?set AIRLLM_ADMIN_PASSWORD in deploy/.env (run make gen-secrets)}
      CAPTURE_BLOB_DIR: "/var/lib/airllm/captures"
      # First-boot default for the DLP sidecar URL; ignored once DLP config is saved.
      DLP_MODEL_URL_DEFAULT: "http://dlp-bert:8000"
    volumes:
      - captures:/var/lib/airllm/captures
    # Loopback by default. With --profile tls, Caddy is the public entry — keep
    # APP_BIND on loopback so the app is not also exposed on a public NIC (Caddy
    # reaches it internally as app:8080).
    ports:
      - "${APP_BIND:-127.0.0.1:8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # /readyz pings Postgres + Redis (vs /healthz which is always 200).
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/readyz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Opt-in TLS reverse proxy with automatic Let's Encrypt HTTPS: `--profile tls`.
  # Requires a real DOMAIN pointed at this host and open ports 80/443.
  caddy:
    image: caddy:2-alpine
    profiles: ["tls"]
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in deploy/.env for the tls profile}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in deploy/.env for the tls profile}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    restart: unless-stopped

  # Opt-in DLP BERT sidecar (heavy: torch + model weights): `--profile bert`.
  # Set the Sidecar URL to http://dlp-bert:8000 under Admin -> DLP; --scale to add replicas.
  dlp-bert:
    build:
      context: ./dlp-bert
    profiles: ["bert"]
    # The model is memory-hungry (torch + weights). Bound it for your host, e.g.:
    #   mem_limit: 4g
    #   cpus: "2"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  captures:
  caddy_data:
  caddy_config:
