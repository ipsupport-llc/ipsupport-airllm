services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airouter
      POSTGRES_PASSWORD: airouter
      POSTGRES_DB: airouter
    # Host port offset to avoid colliding with other local services.
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airouter"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    # Host port offset to avoid colliding with other local services.
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://airouter:airouter@postgres:5432/airouter?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      ENV: "dev"
      AUTH_MODE: "mock"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
