services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airllm
      POSTGRES_PASSWORD: airllm
      POSTGRES_DB: airllm
    # Loopback-only + offset host port (never expose a DB on a public IP).
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airllm"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    # Loopback-only + offset host port (Redis has no auth; never expose it).
    ports:
      - "127.0.0.1:56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://airllm:airllm@postgres:5432/airllm?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      ENV: "dev"
      AUTH_MODE: "mock"
      # Writable path for capture blobs (the app runs as a non-root user).
      # Ephemeral here; back it with a volume / object store on deploy.
      CAPTURE_BLOB_DIR: "/tmp/airllm-captures"
    # Default to loopback; set APP_BIND (e.g. in deploy/.env) to publish on a
    # specific LAN interface like "10.0.0.2:8088". Never bind to 0.0.0.0 on a
    # host with a public IP. In k8s the app listens on 0.0.0.0 behind the
    # ingress instead.
    ports:
      - "${APP_BIND:-127.0.0.1:8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # DLP BERT-NER sidecar (layer 2). Opt-in: `--profile bert`. Heavy image
  # (torch + model weights). Set the gateway's DLP model_url to
  # http://dlp-bert:8000 in the console. Loopback-only on the host.
  dlp-bert:
    build:
      context: ./dlp-bert
    profiles: ["bert"]
    ports:
      - "127.0.0.1:8000:8000"

  # Observability stack. Opt-in: `--profile metrics`.
  # Prometheus scrapes the app's /metrics endpoint; Grafana serves the
  # pre-provisioned AirLLM Overview dashboard at http://localhost:3000.
  # Admin password is dev-only; change it on any real deploy.
  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["metrics"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["metrics"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"   # dev-only; change on any real deploy
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on: [prometheus]

volumes:
  pgdata:
