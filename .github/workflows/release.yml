name: Release

# On a semver tag (e.g. v1.2.3), build and push the container images to GHCR.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  # GitOps consumers track the chart on main with an empty image.tag, so the
  # image they run is Chart.yaml's appVersion. A release whose tag doesn't
  # match the chart ships images nobody deploys — fail fast instead.
  chart-version-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Chart.yaml appVersion must match the release tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          app_version=$(sed -n 's/^appVersion: "\(.*\)"$/\1/p' deploy/helm/airllm/Chart.yaml)
          if [ "$app_version" != "$tag" ]; then
            echo "::error::Chart.yaml appVersion is \"$app_version\" but the release tag is \"$tag\"."
            echo "::error::Bump version + appVersion in deploy/helm/airllm/Chart.yaml on main BEFORE tagging."
            exit 1
          fi
          echo "appVersion $app_version matches tag v$tag"

  images:
    needs: chart-version-guard
    runs-on: ubuntu-latest
    timeout-minutes: 60   # dlp-bert pulls torch + a model at build time
    strategy:
      fail-fast: false    # one image failing shouldn't cancel the other
      matrix:
        include:
          - image: ghcr.io/ipsupport-llc/ipsupport-airllm
            context: .
            dockerfile: deploy/Dockerfile
          - image: ghcr.io/ipsupport-llc/ipsupport-airllm-dlp-bert
            context: deploy/dlp-bert
            dockerfile: deploy/dlp-bert/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
